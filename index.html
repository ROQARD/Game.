<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Climb: Operation Zenith</title>
    <style>
        * { box-sizing: border-box; user-select: none; touch-action: none; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #nameInput {
            padding: 15px; font-size: 20px; border: 2px solid #0f0;
            background: #111; color: #0f0; text-align: center; outline: none;
        }
        
        #top-ui {
            position: fixed; top: 10px; width: 100%; display: flex; 
            flex-direction: column; align-items: center; pointer-events: none;
        }
        #progress-wrapper { width: 60%; height: 10px; border: 1px solid #fff; background: #222; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; transition: 0.3s; }

        .controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; }
        .btn { 
            pointer-events: auto; width: 80px; height: 80px; 
            background: rgba(0, 255, 0, 0.1); border: 2px solid #0f0; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: #0f0; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="color: #0f0;">CORE ACCESS REQUIRED</h1>
        <input type="text" id="nameInput" placeholder="ENTER CODENAME..." maxlength="10">
        <p style="color: #555; margin-top: 20px;">PRESS ENTER TO DEPLOY</p>
    </div>

    <div id="top-ui">
        <div style="color: #fff; margin-bottom: 5px; font-size: 12px;">GLOBAL ALTITUDE PROGRESS</div>
        <div id="progress-wrapper"><div id="progress-bar"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div style="display:flex; gap:15px;">
            <div class="btn" id="lBtn">←</div>
            <div class="btn" id="rBtn">→</div>
        </div>
        <div class="btn" id="jBtn">JUMP</div>
    </div>

    <script src="client.js"></script>
</body>
</html>
