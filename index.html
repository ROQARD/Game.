<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Climb: Zenith</title>
    <style>
        /* "Normal" modern fonts */
        * { box-sizing: border-box; user-select: none; touch-action: none; font-family: system-ui, -apple-system, sans-serif; }
        body { margin: 0; background: #0a0a10; overflow: hidden; color: white; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #nameInput {
            padding: 15px; font-size: 24px; border: 2px solid #4CAF50;
            background: #222; color: white; text-align: center; border-radius: 12px;
        }
        
        #top-ui {
            position: fixed; top: 20px; width: 100%; display: flex; 
            flex-direction: column; align-items: center; pointer-events: none;
        }
        #progress-wrapper { width: 70%; height: 14px; border-radius: 7px; background: #333; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A); transition: 0.5s; }

        /* Bigger, better buttons */
        .controls { position: fixed; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; }
        .btn { 
            pointer-events: auto; width: 100px; height: 100px; 
            background: rgba(255, 255, 255, 0.1); border: 4px solid #fff; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 28px; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .btn:active { background: #fff; color: #000; }
        #jBtn { background: rgba(76, 175, 80, 0.3); border-color: #4CAF50; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>Welcome Back</h1>
        <input type="text" id="nameInput" placeholder="Enter Name..." maxlength="12">
        <p style="opacity: 0.6;">Press Enter to Join the Server</p>
    </div>

    <div id="top-ui">
        <div style="font-weight: bold; margin-bottom: 8px;">TEAM ASCENSION PROGRESS</div>
        <div id="progress-wrapper"><div id="progress-bar"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div style="display:flex; gap:20px;">
            <div class="btn" id="lBtn">←</div>
            <div class="btn" id="rBtn">→</div>
        </div>
        <div class="btn" id="jBtn">JUMP</div>
    </div>

    <script src="client.js"></script>
</body>
</html>
