<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Multiplayer Runner</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: white; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #top-bar { pointer-events: auto; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); }
        input { background: rgba(255,255,255,0.1); border: 1px solid #fff; color: #fff; padding: 8px; border-radius: 5px; width: 120px; }

        .controls-container { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; pointer-events: none; }
        .group { display: flex; gap: 15px; pointer-events: auto; }
        .btn { 
            width: 70px; height: 70px; 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.4); 
            border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn:active { background: rgba(255, 255, 255, 0.4); transform: scale(0.95); }
        #jumpBtn { background: rgba(66, 135, 245, 0.3); border-color: #4287f5; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="top-bar">
            <input type="text" id="nameTag" placeholder="Name..." maxlength="10">
            <div id="status">Connecting...</div>
        </div>

        <div class="controls-container">
            <div class="group">
                <div class="btn" id="leftBtn">←</div>
                <div class="btn" id="rightBtn">→</div>
            </div>
            <div class="group">
                <div class="btn" id="jumpBtn">UP</div>
            </div>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
